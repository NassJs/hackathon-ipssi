services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB:-hkt}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - mongo

volumes:
  mongo_data:

